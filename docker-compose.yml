services:
  anon-router:
    build:
      context: .
      dockerfile: Dockerfile
    image: anonymous-network:1.0.0
    container_name: anon-router
    restart: unless-stopped
    user: "65532:65532"
    ports:
      - "7656:7656/tcp"
      - "7656:7656/udp"
      - "4447:4447/tcp"
    volumes:
      - ./data:/data
    command:
      - "-config"
      - "/data/config.json"
      - "-listen"
      - "0.0.0.0:7656"
      - "-socks"
      - "0.0.0.0:4447"
      - "-no-upnp"
    healthcheck:
      test: ["CMD-SHELL", "test -f /data/config.json && test -f /data/identity.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    user: "65534:65534"
    expose:
      - "9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped
    user: "472:472"
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  prometheus_data:
  grafana_data:
