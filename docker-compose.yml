services:
  anon-router:
    build:
      context: .
      dockerfile: Dockerfile
    image: anonymous-network:latest
    container_name: anon-router
    restart: unless-stopped
    ports:
      - "7656:7656/tcp"
      - "7656:7656/udp"
      - "4447:4447/tcp"
    volumes:
      - ./data:/data
    command:
      - "-config"
      - "/data/config.json"
      - "-listen"
      - "0.0.0.0:7656"
      - "-socks"
      - "0.0.0.0:4447"
      - "-no-upnp"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  prometheus_data:
  grafana_data:
