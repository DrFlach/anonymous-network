name: Build & Deploy to VPS

# Запускается при push в main
on:
  push:
    branches: [main]
  # Можно также запустить вручную из GitHub UI
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o anon-router ./cmd/router/
          echo "Binary size: $(du -h anon-router | cut -f1)"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo systemctl stop anon-router 2>/dev/null || true
            sleep 2

      - name: Upload binary to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "anon-router"
          target: "/opt/anon-router/"

      - name: Start router on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            chmod +x /opt/anon-router/anon-router
            sudo systemctl restart anon-router
            sleep 3
            sudo systemctl is-active anon-router && echo "✅ Router is running!" || echo "❌ Router failed to start"
