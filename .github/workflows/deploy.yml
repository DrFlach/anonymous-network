name: Deploy Anon Router to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy project files to VM
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }} # <-- Вот эта строка
          source: "cmd/,go.mod,go.sum,Dockerfile,docker-compose.yml,prometheus.yml"
          target: "/home/azureuser/anon-network"
          overwrite: true

      - name: Build and start Docker containers
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }} # <-- И вот эта строка
          script: |
            set -e
            sudo mkdir -p /home/azureuser/anon-network/data
            cd /home/azureuser/anon-network
            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d --build
            sudo docker compose ps