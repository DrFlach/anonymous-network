name: CI Quality Gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l .)" || (echo "Run gofmt on changed files" && gofmt -l . && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Race detector
        run: go test -race ./...

      - name: Coverage floor
        run: |
          go test -coverprofile=coverage.out ./...
          total=$(go tool cover -func=coverage.out | awk '/total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          awk -v c="$total" 'BEGIN { if (c+0 < 10.0) { print "Coverage floor failed (<10%)"; exit 1 } }'

      - name: Secret leakage guard
        run: |
          if git grep -nE '"(signing_private_key|encryption_private_key)"\s*:' -- ':!identity.json' ':!**/identity.json'; then
            echo "Potential private key material committed";
            exit 1;
          fi
